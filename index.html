<!DOCTYPE html>
<html>
<head>
  <title>CreatorScope X</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      margin: 10px;
      cursor: pointer;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h1>🚀 CreatorScope X</h1>

<input id="channel" placeholder="Enter Channel Name" />
<br>
<button onclick="getData()">Analyze</button>

<div id="output"></div>

<script>
async function getData() {
  let channel = document.getElementById("channel").value;

  if (!channel) {
    alert("Enter channel name");
    return;
  }

  try {
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${channel}&type=channel&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
    let data = await res.json();

    let channelId = data.items[0].id.channelId;

    let statsRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
    let stats = await statsRes.json();

    let info = stats.items[0].statistics;

    document.getElementById("output").innerHTML = `
      <div class="card">
        <h2>${channel}</h2>
        <p>Subscribers: ${info.subscriberCount}</p>
        <p>Views: ${info.viewCount}</p>
        <p>Videos: ${info.videoCount}</p>
      </div>
    `;
  } catch (error) {
    document.getElementById("output").innerText = "Error fetching data";
  }
}
</script>
</body>
</html>
