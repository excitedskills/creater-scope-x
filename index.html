<!DOCTYPE html>
<html>
<head>
  <title>CreatorScope X Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 CreatorScope X Pro</h1>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <input id="username" placeholder="Enter username" />
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">

    <h3 id="welcome"></h3>

    <input id="channel" placeholder="Enter channel" />
    <button onclick="getData()">Analyze</button>

    <div id="output"></div>
    <div id="ai"></div>
    <div id="saved"></div>

    <canvas id="chart"></canvas>

  </div>

</div>

<script>
let currentUser = null;

// LOGIN
function login() {
  let user = document.getElementById("username").value;
  if (!user) return alert("Enter username");

  localStorage.setItem("user", user);
  currentUser = user;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome " + user;

  loadSaved();
}

// AUTO LOGIN
window.onload = () => {
  let user = localStorage.getItem("user");
  if (user) {
    currentUser = user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = "Welcome " + user;
    loadSaved();
  }
};

// REAL AI (GPT)
async function getAI(channel) {
  let res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer 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",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "user", content: `Give YouTube growth strategy for ${channel}` }
      ]
    })
  });

  let data = await res.json();
  return data.choices[0].message.content;
}

// FETCH DATA
async function getData() {
  let channel = document.getElementById("channel").value;

  let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${channel}&type=channel&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
  let data = await res.json();

  let id = data.items[0].id.channelId;

  let statsRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${id}&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
  let stats = await statsRes.json();

  let info = stats.items[0].statistics;
  let subs = parseInt(info.subscriberCount);

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h2>${channel}</h2>
      <p>Subscribers: ${subs}</p>
      <p>Views: ${info.viewCount}</p>
      <p>Videos: ${info.videoCount}</p>
    </div>
  `;

  // AI
  let ai = await getAI(channel);
  document.getElementById("ai").innerHTML = `
    <div class="card">
      <h3>AI Insights</h3>
      <p>${ai}</p>
    </div>
  `;

  // SAVE REPORT
  saveReport(channel, subs);

  // CHART
  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Subscribers", "Views", "Videos"],
      datasets: [{
        label: "Stats",
        data: [subs, info.viewCount, info.videoCount]
      }]
    }
  });
}

// SAVE REPORT
function saveReport(channel, subs) {
  let reports = JSON.parse(localStorage.getItem("reports") || "[]");

  reports.push({
    user: currentUser,
    channel: channel,
    subs: subs
  });

  localStorage.setItem("reports", JSON.stringify(reports));
  loadSaved();
}

// LOAD SAVED
function loadSaved() {
  let reports = JSON.parse(localStorage.getItem("reports") || "[]");

  let userReports = reports.filter(r => r.user === currentUser);

  document.getElementById("saved").innerHTML = `
    <div class="card">
      <h3>Saved Reports</h3>
      ${userReports.map(r => `<p>${r.channel} - ${r.subs} subs</p>`).join("")}
    </div>
  `;
}
</script>

</body>
</html>
