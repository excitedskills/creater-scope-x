<!DOCTYPE html>
<html>
<head>
  <title>CreatorScope X Ultra</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    input {
      padding: 12px;
      width: 60%;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      background: linear-gradient(45deg, #22c55e, #4ade80);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-left: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .big {
      font-size: 26px;
      font-weight: bold;
      color: #4ade80;
    }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 12px;
    }

    .fade-in {
      animation: fade 1s ease-in;
    }

    @keyframes fade {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<h1>🚀 CreatorScope X Ultra</h1>

<div class="container">

  <input id="channel" placeholder="Enter Channel Name" />
  <button onclick="getData()">Analyze</button>

  <div id="output"></div>
  <div id="ai"></div>

  <canvas id="chart"></canvas>

</div>

<script>
function animateValue(id, start, end, duration) {
  let obj = document.getElementById(id);
  let range = end - start;
  let current = start;
  let increment = end > start ? 1 : -1;
  let stepTime = Math.abs(Math.floor(duration / range));

  let timer = setInterval(() => {
    current += increment;
    obj.innerText = current.toLocaleString();
    if (current == end) clearInterval(timer);
  }, stepTime);
}

async function getData() {
  let channel = document.getElementById("channel").value;

  let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${channel}&type=channel&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
  let data = await res.json();

  let id = data.items[0].id.channelId;

  let statsRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${id}&key=AIzaSyCJsXeTznWP5Sp0DR2ccUTHUwGB72VoLLU`);
  let stats = await statsRes.json();

  let info = stats.items[0].statistics;

  let subs = parseInt(info.subscriberCount);
  let views = parseInt(info.viewCount);
  let vids = parseInt(info.videoCount);

  let viral = Math.min(100, Math.floor(subs / 1000000));

  document.getElementById("output").innerHTML = `
    <div class="grid fade-in">
      <div class="card"><div id="subs" class="big">0</div><div>Subscribers</div></div>
      <div class="card"><div id="views" class="big">0</div><div>Views</div></div>
      <div class="card"><div id="vids" class="big">0</div><div>Videos</div></div>
      <div class="card"><div class="big">${viral}</div><div>🔥 Viral Score</div></div>
    </div>
  `;

  animateValue("subs", 0, subs, 1000);
  animateValue("views", 0, views, 1000);
  animateValue("vids", 0, vids, 1000);

  // AI STYLE OUTPUT
  document.getElementById("ai").innerHTML = `
    <div class="card fade-in">
      <h3>🧠 AI Strategy</h3>
      <ul style="text-align:left">
        <li>Focus on storytelling hooks</li>
        <li>Increase retention with faster pacing</li>
        <li>Use high CTR thumbnails</li>
        <li>Post consistently (2-3 times/week)</li>
      </ul>
    </div>
  `;

  // CHART (FIXED + CLEAN)
  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Subscribers", "Views", "Videos"],
      datasets: [{
        label: "Channel Stats",
        data: [subs, views, vids]
      }]
    }
  });
}
</script>

</body>
</html>
